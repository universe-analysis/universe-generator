<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3+1 Universe — 3-Sphere (Hopf / stereographic)</title>
    <style>
        :root { color-scheme: dark; }
        html,body { margin:0; height:100%; background:#000006; color:#aeb8cc; font-family:sans-serif; overflow:hidden; }
        #panel {
            position:fixed; top:0; left:0; right:0; z-index:10;
            display:flex; flex-wrap:wrap; align-items:center; gap:8px 14px;
            padding:9px 13px; background:rgba(4,5,12,.82);
            border-bottom:1px solid #161c2c; backdrop-filter:blur(4px);
        }
        #panel label { font-size:12px; display:inline-flex; align-items:center; gap:5px; }
        #panel input[type=number]{ width:62px; background:#0c1018; color:#cdd6e4; border:1px solid #232c40; border-radius:4px; padding:3px 5px; }
        #panel input[type=range]{ width:96px; }
        button { background:#141c30; color:#dce4f4; border:1px solid #29344f; border-radius:5px; padding:5px 10px; cursor:pointer; font-size:12px; }
        button:hover { background:#1d2742; }
        button.on { background:#2f6f4f; border-color:#3f9f6f; }
        #status { font-size:12px; color:#7d8aa6; margin-left:auto; }
        canvas { display:block; }
        .sep { width:1px; height:20px; background:#222b40; }
    </style>
</head>
<body>
    <div id="panel">
        <label>Groups <input type="number" id="groupInput" value="800" min="1"></label>
        <label>Time-steps <input type="number" id="timeInput" value="160" min="2"></label>
        <button id="generateBtn">Generate</button>
        <button id="abortBtn">Abort</button>
        <span class="sep"></span>
        <button id="cloudBtn">Cloud</button>
        <button id="sweepBtn" class="on">Sweep ▶</button>
        <button id="spinBtn" class="on">Auto-spin</button>
        <button id="viewBtn">View: Persp</button>
        <button id="mapBtn" class="on">Map: Super</button>
        <button id="shellBtn" class="on">Shell</button>
        <span class="sep"></span>
        <button id="paintBtn">Paint: Mono</button>
        <button id="normBtn">Norm: Per-particle</button>
        <button id="logBtn" class="on">Log</button>
        <button id="localBtn" class="on">Local geom</button>
        <button id="capBtn">Cap glow</button>
        <span class="sep"></span>
        <button id="hopfBtn" class="on">4D spin</button>
        <label>Hopf <input type="range" id="hopfRange" min="0" max="6.283" step="0.005" value="0"></label>
        <button id="playBtn" class="on">Play ▶</button>
        <label>Speed <input type="range" id="speedRange" min="0.05" max="5" step="0.05" value="1"><span id="speedVal" style="width:30px;display:inline-block;color:#9fb0d0">1×</span></label>
        <label>Time <input type="range" id="timeScrub" min="0" max="1" step="0.001" value="0"></label>
        <span class="sep"></span>
        <label>Glow <input type="range" id="sizeRange" min="0.05" max="4" step="0.01" value="0.7"></label>
        <label>Scale <input type="range" id="scaleRange" min="1" max="24" step="0.5" value="12"></label>
        <label>Shape n <input type="range" id="shapeRange" min="2" max="10" step="0.1" value="3"></label>
        <label>S³ k <input type="range" id="kRange" min="0.2" max="3" step="0.05" value="1"></label>
        <label>Cap <input type="range" id="capRange" min="0.5" max="1" step="0.01" value="0.85"></label>
        <span id="status">Idle — press Generate</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
    /* ================================================================
       PART 1 — 3+1 PATH GENERATION  (three spatial sine-paths)
         x(τ)=ax·sin(bx·τ)+ax2·sin(τ),  similarly y, w ;  τ∈(0,π)
       Collision-checked in 3D COMOVING space (÷ sin τ → constant cell
       2/T) via a per-time-step 3D spatial hash (27-neighbour). 3 spatial
       dims ⇒ much more room than 2+1, so far more unique paths fit.
    ================================================================ */
    const groupInput = document.getElementById('groupInput');
    const timeInput  = document.getElementById('timeInput');
    const statusEl   = document.getElementById('status');

    let functions = [];
    let Z_cache = [];
    let time_steps, modulation_Max, targetGroups, groupIDcount = 0, abort_gen = false;
    const maxAttemptsPerFunction = 50;

    function bakeZValues() {
        const zStart = 0.01, zEnd = Math.PI - 0.01;
        const step = (zEnd - zStart) / (time_steps - 1);
        Z_cache = Array.from({ length: time_steps }, (_, i) => zStart + i * step);
    }

    let CELL = 1, gridByT = [], saturated = false;
    function resetGrid(){ CELL = 2 / time_steps; gridByT = Array.from({ length: Z_cache.length }, () => new Map()); }
    function ckey(cx,cy,cw){ return cx + '_' + cy + '_' + cw; }

    function comovingTraj(ax,ay,aw,bx,by,bw,ax2,ay2,aw2){
        const n = Z_cache.length, X=new Float32Array(n), Y=new Float32Array(n), W=new Float32Array(n);
        for (let i=0;i<n;i++){ const z=Z_cache[i], inv=1/Math.sin(z);
            X[i]=(ax*Math.sin(bx*z)+ax2*Math.sin(z))*inv;
            Y[i]=(ay*Math.sin(by*z)+ay2*Math.sin(z))*inv;
            W[i]=(aw*Math.sin(bw*z)+aw2*Math.sin(z))*inv; }
        return {X,Y,W};
    }
    function collides(tr){
        const n=Z_cache.length;
        for (let i=0;i<n;i++){
            const Xi=tr.X[i],Yi=tr.Y[i],Wi=tr.W[i], m=gridByT[i];
            const cx=Math.floor(Xi/CELL), cy=Math.floor(Yi/CELL), cw=Math.floor(Wi/CELL);
            for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) for (let dw=-1;dw<=1;dw++){
                const arr=m.get(ckey(cx+dx,cy+dy,cw+dw)); if(!arr) continue;
                for (let j=0;j<arr.length;j+=3)
                    if (Math.abs(Xi-arr[j])<=CELL && Math.abs(Yi-arr[j+1])<=CELL && Math.abs(Wi-arr[j+2])<=CELL) return true;
            }
        }
        return false;
    }
    function insertTraj(tr){
        const n=Z_cache.length;
        for (let i=0;i<n;i++){ const m=gridByT[i];
            const k=ckey(Math.floor(tr.X[i]/CELL),Math.floor(tr.Y[i]/CELL),Math.floor(tr.W[i]/CELL));
            let a=m.get(k); if(!a){a=[]; m.set(k,a);} a.push(tr.X[i],tr.Y[i],tr.W[i]); }
    }

    function generateFunction(){
        for (let attempt=0; attempt<maxAttemptsPerFunction; attempt++){
            const xs=Math.random(), ys=Math.random(), ws=Math.random();
            const bx=Math.floor(Math.random()*modulation_Max)+2;
            const by=Math.floor(Math.random()*modulation_Max)+2;
            const bw=Math.floor(Math.random()*modulation_Max)+2;
            let ax2=xs, ay2=ys, aw2=ws;
            let ax=(1-xs)/bx, ay=(1-ys)/by, aw=(1-ws)/bw;
            if(Math.random()>0.5) ax*=-1;  if(Math.random()>0.5) ay*=-1;  if(Math.random()>0.5) aw*=-1;
            if(Math.random()>0.5) ax2*=-1; if(Math.random()>0.5) ay2*=-1; if(Math.random()>0.5) aw2*=-1;
            const tr=comovingTraj(ax,ay,aw,bx,by,bw,ax2,ay2,aw2);
            if(!collides(tr)){ insertTraj(tr);
                return {ax,ay,aw,bx,by,bw,ax2,ay2,aw2,groupID:groupIDcount}; }
        }
        return null;
    }

    function make_groups(){
        const t0=performance.now(); let consecFails=0;
        while (functions.length<targetGroups && !abort_gen){
            const nf=generateFunction();
            if(nf){ functions.push(nf); groupIDcount++; consecFails=0; }
            else if(++consecFails>500){ saturated=true; break; }
            if(performance.now()-t0>12) break;
        }
        if (functions.length<targetGroups && !abort_gen && !saturated){
            statusEl.textContent = `Generating… ${functions.length}/${targetGroups}`;
            setTimeout(make_groups,0);
        } else {
            const note = saturated ? ' (space saturated)' : '';
            statusEl.textContent = `Generated ${functions.length} paths${note} — uploading…`;
            setTimeout(()=>{ buildBuffers(); rebuildGPU();
                statusEl.textContent = `${functions.length} paths${note} · ${time_steps} steps`; },0);
        }
    }

    /* ================================================================
       PART 2 — RENDER: 3-sphere stereographic (Hopf) projection
       Per particle at time τ:
         1. comoving 3-pos p  (or raw, which breathes & collapses at Bang)
         2. inverse stereographic ℝ³ → S³ ⊂ ℝ⁴
         3. 4D isoclinic (Hopf) rotation by φ        ← the signature motion
         4. stereographic S³ → ℝ³  → render
       All in the vertex shader; τ and φ are uniforms (free scrubbing).
    ================================================================ */
    const CAM = 34;
    let viewScale = 12, mapMode = 'super';   // 'super' (superellipsoid) | 'hopf'

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000006);
    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    let viewMode='persp', autoRotateOn=true;
    let camera, controls;
    function makeCamera(){
        const aspect=innerWidth/innerHeight;
        if (viewMode==='ortho'){
            const h=CAM*0.55;
            const c=new THREE.OrthographicCamera(-h*aspect,h*aspect,h,-h,-4000,8000);
            c.position.set(CAM,0,0.001); c.up.set(0,0,1); return c;
        }
        const c=new THREE.PerspectiveCamera(55, aspect, 0.1, 8000);
        c.position.set(0.2*CAM, -1.0*CAM, 0.62*CAM); c.up.set(0,1,0); return c;
    }
    function rebuildControls(){
        const tgt = controls ? controls.target.clone() : new THREE.Vector3();
        if (controls) controls.dispose();
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping=true; controls.autoRotate=autoRotateOn; controls.autoRotateSpeed=0.5;
        controls.target.copy(tgt); controls.update();
    }
    function setView(m){ viewMode=m; camera=makeCamera(); rebuildControls(); }
    camera=makeCamera(); rebuildControls();

    function makeGlow(){
        const c=document.createElement('canvas'); c.width=c.height=64; const g=c.getContext('2d');
        const grd=g.createRadialGradient(32,32,0,32,32,32);
        grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.16,'rgba(255,255,255,0.85)');
        grd.addColorStop(0.45,'rgba(255,255,255,0.18)'); grd.addColorStop(1,'rgba(255,255,255,0)');
        g.fillStyle=grd; g.fillRect(0,0,64,64);
        const t=new THREE.Texture(c); t.needsUpdate=true; return t;
    }
    const glowTex=makeGlow();
    const LOG_TMAX=Math.log(1/Math.sin(0.01));

    const U = {
        uZ0:{value:0}, uStep:{value:1}, uT:{value:1}, uTime:{value:0},
        uGeoLocal:{value:1}, uMode:{value:0}, uLog:{value:1}, uPecGlobal:{value:0},
        uGMin:{value:0}, uGMax:{value:1}, uLogTmax:{value:LOG_TMAX},
        uK:{value:1}, uPhi:{value:0}, uViewScale:{value:viewScale},
        uMapMode:{value:0}, uShapeN:{value:3},
        uCap:{value:0}, uCapThresh:{value:0.85},
        uSize:{value:0.7}, uOpacity:{value:0.6}, uTex:{value:glowTex},
        // ortho cameras have no perspective attenuation: point size must come from
        // camera.zoom, never from view depth (-mv.z), which goes through 0 at the
        // camera plane (size blow-up in front, 1px collapse behind). 0 = perspective.
        uOrthoScale:{value:0}
    };

    const VERT = `
        precision highp float;
        uniform mat4 modelViewMatrix, projectionMatrix;
        attribute vec3 position;          // position.x = time-step index i
        attribute vec3 aAmp1;             // ax, ay, aw
        attribute vec3 aAmp2;             // ax2, ay2, aw2
        attribute vec3 aFreq;             // bx, by, bw
        attribute vec2 aPec;              // per-particle comoving speed min,max
        uniform float uZ0,uStep,uT,uTime,uGMin,uGMax,uLogTmax,uK,uPhi,uViewScale,uSize,uCapThresh,uShapeN,uOrthoScale;
        uniform int uGeoLocal,uMode,uLog,uPecGlobal,uSliceMode,uCap,uMapMode;
        varying vec3 vColor;
        vec3 comov3(float z){
            float s=sin(z);
            return vec3(aAmp1.x*sin(aFreq.x*z)+aAmp2.x*sin(z),
                        aAmp1.y*sin(aFreq.y*z)+aAmp2.y*sin(z),
                        aAmp1.z*sin(aFreq.z*z)+aAmp2.z*sin(z))/s;
        }
        vec3 ramp(float t){
            t=clamp(t,0.0,1.0);
            vec3 c0=vec3(0.10,0.18,0.55),c1=vec3(0.30,0.55,0.95),c2=vec3(0.55,0.85,0.75),c3=vec3(1.0,0.82,0.35),c4=vec3(1.0,0.97,0.92);
            if(t<0.35)return mix(c0,c1,t/0.35);
            if(t<0.6)return mix(c1,c2,(t-0.35)/0.25);
            if(t<0.8)return mix(c2,c3,(t-0.6)/0.2);
            return mix(c3,c4,(t-0.8)/0.2);
        }
        // p (ℝ³) → S³ ⊂ ℝ⁴  (inverse stereographic), then Hopf rotation, then S³ → ℝ³
        vec3 hopfProject(vec3 p){
            vec3 kp = uK*p;
            float d = 1.0 + dot(kp,kp);
            vec4 X = vec4(2.0*kp/d, (dot(kp,kp)-1.0)/d);     // on unit S³
            float c1=cos(uPhi), s1=sin(uPhi);               // 4D isoclinic rotation
            vec4 Xr = vec4(X.x*c1 - X.y*s1, X.x*s1 + X.y*c1, X.z*c1 - X.w*s1, X.z*s1 + X.w*c1);
            float denom = (1.0 - Xr.w) + 1e-4;              // stereographic from north pole
            return Xr.xyz / denom * uViewScale;
        }
        void main(){
            float i = position.x;
            float z = (uSliceMode==1) ? uTime : (uZ0 + i*uStep);
            float s = sin(z);
            vec3 cm = comov3(z);
            vec3 p = (uGeoLocal==1) ? cm : cm*s;            // local=comoving, global=raw(breathes)
            vec3 P;
            if (uMapMode==0){                               // SUPERELLIPSOID: morph cube(cap)↔sphere(cosmo)
                float n = uShapeN;
                float linf = max(max(abs(p.x),abs(p.y)),abs(p.z));
                float ln = pow(pow(abs(p.x),n)+pow(abs(p.y),n)+pow(abs(p.z),n), 1.0/n);
                P = p * ((ln>1e-5) ? linf/ln : 1.0) * uViewScale;
            } else {                                        // HOPF: S³ stereographic projection
                P = hopfProject(p);
            }
            vec4 mv = modelViewMatrix * vec4(P,1.0);
            gl_Position = projectionMatrix * mv;
            // causality-cap highlight: particles whose comoving coord nears the ±1 light-cone cap
            float capness = (uCap==1) ? smoothstep(uCapThresh, 1.0, max(max(abs(cm.x),abs(cm.y)),abs(cm.z))) : 0.0;
            float sz = uSize * (uSliceMode==1 ? 1.4 : 1.0) * (1.0 + capness*1.6);
            float depth = (uOrthoScale > 0.0) ? uOrthoScale : max(-mv.z, 0.1);
            gl_PointSize = clamp(sz * 300.0 / depth, 1.0, 80.0);
            if(uMode==0){ vColor=vec3(0.78,0.85,1.0); }
            else if(uMode==1){ vColor=ramp(log(1.0/s)/uLogTmax); }
            else {
                float zN = (uSliceMode==1) ? z+uStep : (i<uT-1.0 ? z+uStep : z-uStep);
                float v = length(comov3(zN)-cm)/abs(uStep);
                float lo=(uPecGlobal==1)?uGMin:aPec.x, hi=(uPecGlobal==1)?uGMax:aPec.y;
                float t=(uLog==1)?(log(v+1e-6)-log(lo+1e-6))/max(1e-6,log(hi+1e-6)-log(lo+1e-6)):(v-lo)/max(1e-6,hi-lo);
                vColor=ramp(t);
            }
            if(uSliceMode==1) vColor=min(vColor*1.25, vec3(1.0));
            if(uCap==1){ vColor = mix(vColor*0.4, mix(vColor, vec3(1.0,0.96,0.88), 0.85), capness); }
        }`;
    const FRAG = `
        precision highp float;
        uniform sampler2D uTex; uniform float uOpacity;
        varying vec3 vColor;
        void main(){
            float a=texture2D(uTex, gl_PointCoord).a;
            if(a<0.01) discard;
            gl_FragColor=vec4(vColor, a*uOpacity);
        }`;
    function makeMat(slice){
        return new THREE.RawShaderMaterial({
            uniforms: Object.assign({}, U, { uSliceMode:{value:slice} }),
            vertexShader:VERT, fragmentShader:FRAG, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending });
    }
    const cloudMat=makeMat(0), sweepMat=makeMat(1);

    let instAmp1=null, instAmp2=null, instFreq=null, instPec=null;
    function buildBuffers(){
        const N=functions.length, n=Z_cache.length;
        instAmp1=new Float32Array(N*3); instAmp2=new Float32Array(N*3); instFreq=new Float32Array(N*3); instPec=new Float32Array(N*2);
        let gmn=Infinity, gmx=-Infinity;
        for (let p=0;p<N;p++){
            const f=functions[p];
            instAmp1[p*3]=f.ax; instAmp1[p*3+1]=f.ay; instAmp1[p*3+2]=f.aw;
            instAmp2[p*3]=f.ax2; instAmp2[p*3+1]=f.ay2; instAmp2[p*3+2]=f.aw2;
            instFreq[p*3]=f.bx; instFreq[p*3+1]=f.by; instFreq[p*3+2]=f.bw;
            let mn=Infinity, mx=-Infinity, px=0,py=0,pw=0;
            for (let i=0;i<n;i++){ const z=Z_cache[i], inv=1/Math.sin(z);
                const cx=(f.ax*Math.sin(f.bx*z)+f.ax2*Math.sin(z))*inv;
                const cy=(f.ay*Math.sin(f.by*z)+f.ay2*Math.sin(z))*inv;
                const cw=(f.aw*Math.sin(f.bw*z)+f.aw2*Math.sin(z))*inv;
                if (i>0){ const v=Math.sqrt((cx-px)**2+(cy-py)**2+(cw-pw)**2)/(z-Z_cache[i-1]); if(v<mn)mn=v; if(v>mx)mx=v; }
                px=cx; py=cy; pw=cw;
            }
            instPec[p*2]=mn; instPec[p*2+1]=mx; if(mn<gmn)gmn=mn; if(mx>gmx)gmx=mx;
        }
        U.uGMin.value=gmn; U.uGMax.value=gmx;
        U.uZ0.value=Z_cache[0]; U.uStep.value=(Z_cache[n-1]-Z_cache[0])/(n-1); U.uT.value=n;
    }

    let cloud=null, sweep=null, showCloud=false, showSweep=true;
    function disposeObj(o){ if(o){ scene.remove(o); o.geometry.dispose(); } }
    function rebuildGPU(){
        disposeObj(cloud); disposeObj(sweep); cloud=sweep=null;
        if(!functions.length) return;
        const N=functions.length, n=Z_cache.length;
        const a1=new THREE.InstancedBufferAttribute(instAmp1,3), a2=new THREE.InstancedBufferAttribute(instAmp2,3),
              af=new THREE.InstancedBufferAttribute(instFreq,3), ap=new THREE.InstancedBufferAttribute(instPec,2);
        const baseC=new Float32Array(n*3); for(let i=0;i<n;i++) baseC[i*3]=i;
        const gc=new THREE.InstancedBufferGeometry();
        gc.setAttribute('position', new THREE.Float32BufferAttribute(baseC,3));
        gc.setAttribute('aAmp1',a1); gc.setAttribute('aAmp2',a2); gc.setAttribute('aFreq',af); gc.setAttribute('aPec',ap);
        gc.instanceCount=N;
        cloud=new THREE.Points(gc, cloudMat); cloud.frustumCulled=false; cloud.visible=showCloud; scene.add(cloud);

        const gs=new THREE.InstancedBufferGeometry();
        gs.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(3),3));
        gs.setAttribute('aAmp1',a1); gs.setAttribute('aAmp2',a2); gs.setAttribute('aFreq',af); gs.setAttribute('aPec',ap);
        gs.instanceCount=N;
        sweep=new THREE.Points(gs, sweepMat); sweep.frustumCulled=false; sweep.visible=showSweep; scene.add(sweep);
    }

    /* ---- breathing superellipsoid "shape of space" shell (unit, scaled per frame) ---- */
    let shapeGuide=null, showGuide=true;
    function superPoint(theta,phi,n,out){
        const sp=Math.sin(phi), d0=sp*Math.cos(theta), d1=sp*Math.sin(theta), d2=Math.cos(phi);
        const ln=Math.pow(Math.pow(Math.abs(d0),n)+Math.pow(Math.abs(d1),n)+Math.pow(Math.abs(d2),n),1/n)||1;
        out[0]=d0/ln; out[1]=d1/ln; out[2]=d2/ln;
    }
    function rebuildGuide(){
        if(shapeGuide){ scene.remove(shapeGuide); shapeGuide.geometry.dispose(); shapeGuide.material.dispose(); shapeGuide=null; }
        const n=U.uShapeN.value, segs=[], a=[0,0,0], b=[0,0,0], NLON=16, NLAT=10, STEP=56;
        for (let la=1; la<NLAT; la++){ const phi=Math.PI*la/NLAT;
            for (let sgi=0;sgi<STEP;sgi++){ superPoint(2*Math.PI*sgi/STEP,phi,n,a); superPoint(2*Math.PI*(sgi+1)/STEP,phi,n,b); segs.push(a[0],a[1],a[2],b[0],b[1],b[2]); } }
        for (let lo=0; lo<NLON; lo++){ const theta=2*Math.PI*lo/NLON;
            for (let sgi=0;sgi<STEP;sgi++){ superPoint(theta,Math.PI*sgi/STEP,n,a); superPoint(theta,Math.PI*(sgi+1)/STEP,n,b); segs.push(a[0],a[1],a[2],b[0],b[1],b[2]); } }
        const geo=new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.Float32BufferAttribute(segs,3));
        shapeGuide=new THREE.LineSegments(geo, new THREE.LineBasicMaterial({color:0x2a3450, transparent:true, opacity:0.32}));
        shapeGuide.frustumCulled=false; scene.add(shapeGuide);
    }

    /* ================================================================
       PART 3 — UI + RENDER LOOP
    ================================================================ */
    let frame=0, framePos=0, playSpeed=1, playing=true, fourD=true;

    document.getElementById('generateBtn').addEventListener('click', ()=>{
        abort_gen=false; saturated=false; groupIDcount=0; frame=0; framePos=0;
        time_steps=parseInt(timeInput.value);
        modulation_Max=Math.max(2, Math.floor(time_steps/2));
        targetGroups=parseInt(groupInput.value);
        functions=[]; bakeZValues(); resetGrid(); make_groups();
    });
    document.getElementById('abortBtn').addEventListener('click', ()=> abort_gen=true);

    function toggle(id,get,set){ const el=document.getElementById(id);
        el.addEventListener('click', ()=>{ set(!get()); el.classList.toggle('on', get()); }); }
    toggle('cloudBtn', ()=>showCloud, v=>{ showCloud=v; if(cloud) cloud.visible=v; });
    toggle('sweepBtn', ()=>showSweep, v=>{ showSweep=v; if(sweep) sweep.visible=v; });
    toggle('spinBtn',  ()=>autoRotateOn, v=>{ autoRotateOn=v; controls.autoRotate=v; });
    toggle('hopfBtn',  ()=>fourD, v=>{ fourD=v; });

    document.getElementById('viewBtn').addEventListener('click', e=>{
        setView(viewMode==='persp'?'ortho':'persp');
        e.currentTarget.textContent='View: '+(viewMode==='ortho'?'Ortho':'Persp');
        e.currentTarget.classList.toggle('on', viewMode==='ortho');
    });

    const paintOrder=['mono','temp','pec'], paintLabel={mono:'Mono',temp:'Temp (1/sin τ)',pec:'Speed·local'};
    let paintMode='mono';
    document.getElementById('paintBtn').addEventListener('click', e=>{
        paintMode=paintOrder[(paintOrder.indexOf(paintMode)+1)%3]; U.uMode.value=paintOrder.indexOf(paintMode);
        e.currentTarget.textContent='Paint: '+paintLabel[paintMode];
        e.currentTarget.classList.toggle('on', paintMode!=='mono');
    });
    let pecGlobal=false;
    document.getElementById('normBtn').addEventListener('click', e=>{
        pecGlobal=!pecGlobal; U.uPecGlobal.value=pecGlobal?1:0;
        e.currentTarget.textContent='Norm: '+(pecGlobal?'Global':'Per-particle');
        e.currentTarget.classList.toggle('on', pecGlobal);
    });
    let logColor=true; toggle('logBtn', ()=>logColor, v=>{ logColor=v; U.uLog.value=v?1:0; });
    let geoLocal=true;
    document.getElementById('localBtn').addEventListener('click', e=>{
        geoLocal=!geoLocal; U.uGeoLocal.value=geoLocal?1:0;
        e.currentTarget.classList.toggle('on', geoLocal);
    });

    toggle('playBtn', ()=>playing, v=>{ playing=v; document.getElementById('playBtn').textContent=v?'Play ▶':'Paused'; });
    const timeScrub=document.getElementById('timeScrub'), hopfRange=document.getElementById('hopfRange');
    timeScrub.addEventListener('input', e=>{
        playing=false; const pb=document.getElementById('playBtn'); pb.classList.remove('on'); pb.textContent='Paused';
        if(Z_cache.length){ frame=Math.round(parseFloat(e.target.value)*(Z_cache.length-1)); framePos=frame;
            sweepMat.uniforms.uTime.value=Z_cache[frame]; }
    });
    hopfRange.addEventListener('input', e=>{ fourD=false; document.getElementById('hopfBtn').classList.remove('on'); U.uPhi.value=parseFloat(e.target.value); });
    document.getElementById('speedRange').addEventListener('input', e=>{
        playSpeed=parseFloat(e.target.value);
        document.getElementById('speedVal').textContent=playSpeed.toFixed(2).replace(/0$/,'').replace(/\.$/,'')+'×';
    });
    document.getElementById('sizeRange').addEventListener('input', e=>{ U.uSize.value=parseFloat(e.target.value); });
    document.getElementById('scaleRange').addEventListener('input', e=>{ viewScale=parseFloat(e.target.value); U.uViewScale.value=viewScale; });
    document.getElementById('kRange').addEventListener('input', e=>{ U.uK.value=parseFloat(e.target.value); });
    let capGlow=false; toggle('capBtn', ()=>capGlow, v=>{ capGlow=v; U.uCap.value=v?1:0; });
    document.getElementById('capRange').addEventListener('input', e=>{ U.uCapThresh.value=parseFloat(e.target.value); });
    document.getElementById('mapBtn').addEventListener('click', e=>{
        mapMode = mapMode==='super'?'hopf':'super'; U.uMapMode.value = mapMode==='super'?0:1;
        e.currentTarget.textContent='Map: '+(mapMode==='super'?'Super':'Hopf');
        e.currentTarget.classList.toggle('on', mapMode==='super');
    });
    document.getElementById('shapeRange').addEventListener('input', e=>{ U.uShapeN.value=parseFloat(e.target.value); rebuildGuide(); });
    toggle('shellBtn', ()=>showGuide, v=>{ showGuide=v; });

    addEventListener('resize', ()=>{
        const aspect=innerWidth/innerHeight;
        if(camera.isOrthographicCamera){ const h=CAM*0.55; camera.left=-h*aspect; camera.right=h*aspect; camera.top=h; camera.bottom=-h; }
        else camera.aspect=aspect;
        camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight);
    });

    rebuildGuide();
    setTimeout(()=> document.getElementById('generateBtn').click(), 60);

    function tick(){
        requestAnimationFrame(tick);
        controls.update();
        // ortho: constant reference depth (initial camera distance), scaled by zoom;
        // 0 tells the shaders to fall back to perspective -mv.z attenuation
        U.uOrthoScale.value = camera.isOrthographicCamera ? CAM/camera.zoom : 0;
        if (playing && showSweep && Z_cache.length){
            framePos=(framePos+playSpeed)%Z_cache.length; frame=Math.floor(framePos)%Z_cache.length;
            sweepMat.uniforms.uTime.value=Z_cache[frame];
            timeScrub.value=(frame/(Z_cache.length-1)).toFixed(3);
        }
        if (fourD && mapMode==='hopf'){ U.uPhi.value=(U.uPhi.value+0.0045)%(Math.PI*2); hopfRange.value=U.uPhi.value.toFixed(3); }
        if (shapeGuide){
            const showIt = showGuide && mapMode==='super' && functions.length>0;
            shapeGuide.visible = showIt;
            if (showIt){ const tau=Z_cache.length?Z_cache[frame]:1.5708;
                shapeGuide.scale.setScalar(U.uViewScale.value*(geoLocal?1:Math.sin(tau))); }
        }
        renderer.render(scene, camera);
    }
    tick();
    </script>
</body>
</html>
