<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2+1 Universe — Block-Universe Torus</title>
    <style>
        :root { color-scheme: dark; }
        body { font-family: sans-serif; margin: 0; background: #0a0a12; color: #cdd6e4; }
        #panel {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px;
            padding: 10px 14px; background: rgba(12,14,22,.88);
            border-bottom: 1px solid #222a3a; backdrop-filter: blur(4px);
        }
        #panel label { font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
        #panel input[type=number] { width: 70px; background:#141a28; color:#cdd6e4; border:1px solid #2a3346; border-radius:4px; padding:3px 5px; }
        #panel input[type=range] { width: 110px; }
        button { background:#1d2740; color:#dce4f4; border:1px solid #34406a; border-radius:5px; padding:5px 10px; cursor:pointer; font-size:12px; }
        button:hover { background:#26345c; }
        button.on { background:#2f6f4f; border-color:#3f9f6f; }
        #status { font-size:12px; color:#8fa0c0; margin-left:auto; }
        canvas { display:block; }
        .sep { width:1px; align-self:stretch; background:#2a3346; margin:0 2px; }
    </style>
</head>
<body>
    <div id="panel">
        <label>Groups <input type="number" id="groupInput" value="300" min="1"></label>
        <label>Time-steps <input type="number" id="timeInput" value="200" min="2"></label>
        <button id="generateBtn">Generate</button>
        <button id="abortBtn">Abort</button>
        <span class="sep"></span>
        <button id="worldlinesBtn" class="on">Worldlines</button>
        <button id="sweepBtn" class="on">Sweep ▶</button>
        <button id="ringBtn" class="on">Time ring</button>
        <button id="comovingBtn">Comoving (local)</button>
        <button id="colorBtn">Color: Group</button>
        <span class="sep"></span>
        <label>Loop R <input type="range" id="rRange" min="4" max="24" step="0.5" value="10"></label>
        <label>Spread <input type="range" id="sRange" min="1" max="10" step="0.5" value="4"></label>
        <span id="status">Idle — press Generate</span>
    </div>

    <!-- ----------------------------------------------------------------
         Three.js classic (UMD) builds — load fine from file:// (no ES
         modules / import map → no "blocked:origin" CORS error). Needs net.
    ----------------------------------------------------------------- -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>

    /* ================================================================
       PART 1 — PATH GENERATION  (faithful to the original 2+1 model)
       Each path:  x(z) = ax·sin(bx·z) + ax2·sin(1·z)
                   y(z) = ay·sin(by·z) + ay2·sin(1·z)
       z∈(0,π) is time. Paths are kept only if they never come within a
       (time-scaled) threshold of any already-accepted path → "unique groups".
    ================================================================ */

    const groupInput = document.getElementById('groupInput');
    const timeInput  = document.getElementById('timeInput');
    const statusEl   = document.getElementById('status');

    // View toggles (declared early — rebuildRing() reads showRing at init)
    let showWorldlines = true, showSweep = true, showRing = true, playing = true;
    let comoving = false;   // false = global (raw, pinches at Bang/Crunch); true = local (uniform cross-sections)

    let functions = [];
    let Z_cache = [], Z_reverseCache = {}, Z_threshold_cache = [];
    let time_steps, modulation_Max, numGroups, targetGroups;
    let groupIDcount = 0;
    let abort_gen = false;
    const maxAttemptsPerFunction = 50;

    function bakeZValues() {
        const zStart = 0.01, zEnd = Math.PI - 0.01;
        const step = (zEnd - zStart) / (time_steps - 1);
        Z_cache = Array.from({ length: time_steps }, (_, i) => zStart + i * step);
        Z_reverseCache = {};
        for (let i = 0; i < Z_cache.length; i++) Z_reverseCache[Z_cache[i]] = i;
    }
    function bakeZThresholdValues() {
        Z_threshold_cache = [];
        for (let i = 0; i < Z_cache.length; i++)
            Z_threshold_cache.push(Math.sin(Z_cache[i]) * (2 / time_steps));
    }
    function calculateDynamicThreshold(z) {
        return Z_threshold_cache[Z_reverseCache[z]];
    }

    function generateFunction(existingFunctions) {
        for (let attempt = 0; attempt < maxAttemptsPerFunction; attempt++) {
            const axInitialA = 1, ayInitialA = 1;
            const x_splitratio = Math.random(), y_splitratio = Math.random();

            const axInitial2 = x_splitratio * axInitialA;
            const axInitial  = (1 - x_splitratio) * axInitialA;
            const ayInitial2 = y_splitratio * ayInitialA;
            const ayInitial  = (1 - y_splitratio) * ayInitialA;

            const bx = Math.floor(Math.random() * modulation_Max) + 2;
            const by = Math.floor(Math.random() * modulation_Max) + 2;
            const bx2 = 1, by2 = 1;          // shared low-frequency coherence term
            if (bx === bx2 || by === by2) return null;

            let ax2 = axInitial2 / bx2;
            let ay2 = ayInitial2 / by2;
            let ax  = axInitial  / bx;        // a·b kept ≈ component → slope cap ±1
            let ay  = ayInitial  / by;

            if (Math.random() > 0.5) ax  *= -1;
            if (Math.random() > 0.5) ay  *= -1;
            if (Math.random() > 0.5) ax2 *= -1;
            if (Math.random() > 0.5) ay2 *= -1;

            // Pre-compute this candidate's trajectory
            const local = new Array(Z_cache.length);
            for (let i = 0; i < Z_cache.length; i++) {
                const z = Z_cache[i];
                local[i] = {
                    x: ax * Math.sin(bx * z) + ax2 * Math.sin(bx2 * z),
                    y: ay * Math.sin(by * z) + ay2 * Math.sin(by2 * z)
                };
            }

            // Collision test against every accepted path, at every time-step
            let isUnique = true;
            for (const existing of existingFunctions) {
                let tooClose = false;
                for (let i = 0; i < Z_cache.length; i++) {
                    const z = Z_cache[i];
                    const threshold = calculateDynamicThreshold(z);
                    const x2 = existing.ax * Math.sin(existing.bx * z) + existing.ax2 * Math.sin(existing.bx2 * z);
                    const y2 = existing.ay * Math.sin(existing.by * z) + existing.ay2 * Math.sin(existing.by2 * z);
                    if (Math.abs(local[i].x - x2) <= threshold && Math.abs(local[i].y - y2) <= threshold) {
                        tooClose = true; break;
                    }
                }
                if (tooClose) { isUnique = false; break; }
            }

            if (isUnique) {
                const new_RGB = {
                    r: Math.floor(Math.random() * 255),
                    g: Math.floor(Math.random() * 255),
                    b: Math.floor(Math.random() * 255)
                };
                return { ax, ay, bx, by, ax2, ay2, bx2, by2, new_RGB, groupID: groupIDcount };
            }
        }
        return null;
    }

    function make_groups() {
        const newFunction = generateFunction(functions);
        if (newFunction) { functions.push(newFunction); groupIDcount++; }

        if (functions.length < targetGroups && !abort_gen) {
            statusEl.textContent = `Generating… ${functions.length}/${targetGroups}`;
            setTimeout(make_groups, 0);
        } else {
            statusEl.textContent = `Generated ${functions.length} unique paths — building torus…`;
            // defer so the status paints before the (synchronous) geometry build
            setTimeout(() => { rebuildTorus(); rebuildSlice();
                statusEl.textContent = `${functions.length} paths · ${time_steps} steps`; }, 0);
        }
    }

    /* ================================================================
       PART 2 — BLOCK-UNIVERSE TORUS EMBEDDING
         θ = 2z                    time wraps the big loop (z∈(0,π) → 0..2π)
         P = ((R + S·x)·cosθ, (R + S·x)·sinθ, S·y)
       Local space-x → radial offset, local space-y → vertical.
       Because sin(b·0)=sin(b·π)=0, every path meets at (R,0,0): the single
       pinch where Big Bang and Big Crunch coincide (cyclic universe).
    ================================================================ */

    let R = 10, S = 4;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, -R * 2.4, R * 1.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- Worldlines: one merged LineSegments buffer for all paths ---
    let worldlines = null;
    function disposeObj(o) { if (o) { scene.remove(o); o.geometry.dispose(); o.material.dispose(); } }

    function embed(x, y, z, out) {
        if (comoving) { const s = Math.sin(z); x /= s; y /= s; }  // local: divide out scale factor → uniform slices
        const theta = 2 * z;
        const radial = R + S * x;
        out[0] = radial * Math.cos(theta);
        out[1] = radial * Math.sin(theta);
        out[2] = S * y;
    }

    // --- Color modes + temperature colormap -------------------------------
    let colorMode = 'group';
    const COLOR_MODES  = ['group', 'temp', 'freq', 'speed'];
    const COLOR_LABELS = { group: 'Group', temp: 'Temp (1/sin z)', freq: 'Frequency', speed: 'Comoving speed' };

    // cold(blue) → hot(white) ramp
    function hotmap(t) {
        t = t < 0 ? 0 : t > 1 ? 1 : t;
        const stops = [
            [0.00, [0.04, 0.05, 0.25]],
            [0.25, [0.00, 0.45, 0.95]],
            [0.50, [0.00, 0.85, 0.40]],
            [0.70, [1.00, 0.85, 0.00]],
            [0.88, [1.00, 0.28, 0.00]],
            [1.00, [1.00, 0.95, 0.88]]
        ];
        for (let i = 0; i < stops.length - 1; i++) {
            const [t0, c0] = stops[i], [t1, c1] = stops[i + 1];
            if (t <= t1) {
                const f = (t - t0) / (t1 - t0);
                return [c0[0] + (c1[0]-c0[0])*f, c0[1] + (c1[1]-c0[1])*f, c0[2] + (c1[2]-c0[2])*f];
            }
        }
        return stops[stops.length - 1][1];
    }

    // Temperature ∝ 1/scale-factor; hottest at the pinch (z→0,π). Log-scaled.
    const LOG_TMAX = Math.log(1 / Math.sin(0.01));
    function tempT(z) { return Math.log(1 / Math.sin(z)) / LOG_TMAX; }
    // Per-path "energy" = mean frequency (higher = less coherent / hotter)
    function freqT(f) { return ((f.bx + f.by) / 2 - 2) / Math.max(1, modulation_Max - 1); }

    function localXY(f, z) {   // sampled position in the *displayed* coords (comoving if active)
        let x = f.ax * Math.sin(f.bx * z) + f.ax2 * Math.sin(f.bx2 * z);
        let y = f.ay * Math.sin(f.by * z) + f.ay2 * Math.sin(f.by2 * z);
        if (comoving) { const s = Math.sin(z); x /= s; y /= s; }
        return [x, y];
    }
    let speedNorm = 1;         // max comoving speed, for normalizing the speed colormap
    function computeSpeedNorm() {
        let mx = 1e-9;
        for (const f of functions) for (let i = 0; i < Z_cache.length - 1; i++) {
            const z0 = Z_cache[i], z1 = Z_cache[i + 1];
            const p = localXY(f, z0), q = localXY(f, z1);
            const sp = Math.hypot(q[0]-p[0], q[1]-p[1]) / (z1 - z0);
            if (sp > mx) mx = sp;
        }
        speedNorm = mx;
    }
    // color for one vertex; `speed` only consulted in 'speed' mode
    function vColor(f, z, speed) {
        switch (colorMode) {
            case 'temp':  return hotmap(tempT(z));
            case 'freq':  return hotmap(freqT(f));
            case 'speed': return hotmap(speed / speedNorm);
            default:      return [f.new_RGB.r/255, f.new_RGB.g/255, f.new_RGB.b/255];
        }
    }

    function rebuildTorus() {
        disposeObj(worldlines); worldlines = null;
        if (!functions.length) return;
        if (colorMode === 'speed') computeSpeedNorm();
        const positions = [], colors = [];
        const a = [0, 0, 0], b = [0, 0, 0];
        for (const f of functions) {
            for (let i = 0; i < Z_cache.length - 1; i++) {
                const z0 = Z_cache[i], z1 = Z_cache[i + 1];
                const x0 = f.ax * Math.sin(f.bx * z0) + f.ax2 * Math.sin(f.bx2 * z0);
                const y0 = f.ay * Math.sin(f.by * z0) + f.ay2 * Math.sin(f.by2 * z0);
                const x1 = f.ax * Math.sin(f.bx * z1) + f.ax2 * Math.sin(f.bx2 * z1);
                const y1 = f.ay * Math.sin(f.by * z1) + f.ay2 * Math.sin(f.by2 * z1);
                embed(x0, y0, z0, a);
                embed(x1, y1, z1, b);
                positions.push(a[0], a[1], a[2], b[0], b[1], b[2]);
                let sp = 0;
                if (colorMode === 'speed') {
                    const p = localXY(f, z0), q = localXY(f, z1);
                    sp = Math.hypot(q[0]-p[0], q[1]-p[1]) / (z1 - z0);
                }
                const c0 = vColor(f, z0, sp), c1 = vColor(f, z1, sp);
                colors.push(c0[0], c0[1], c0[2], c1[0], c1[1], c1[2]);
            }
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.55 });
        worldlines = new THREE.LineSegments(geo, mat);
        worldlines.visible = showWorldlines;
        scene.add(worldlines);
    }

    // --- Sweep: the "present moment" slice, animated around the loop ---
    let slice = null, slicePos = null, sliceCol = null, currentFrame = 0;
    function rebuildSlice() {
        disposeObj(slice); slice = null; slicePos = null; sliceCol = null;
        if (!functions.length) return;
        const n = functions.length;
        slicePos = new Float32Array(n * 3);
        sliceCol = new Float32Array(n * 3);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(slicePos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(sliceCol, 3));
        const mat = new THREE.PointsMaterial({ size: 0.35, vertexColors: true, sizeAttenuation: true });
        slice = new THREE.Points(geo, mat);
        slice.visible = showSweep;
        scene.add(slice);
        updateSlice();   // fills positions + colors for the current mode
    }
    function updateSlice() {
        if (!slice) return;
        const z  = Z_cache[currentFrame];
        const zN = Z_cache[(currentFrame + 1) % Z_cache.length];
        const dz = Math.abs(zN - z) || 1;
        const out = [0, 0, 0];
        for (let i = 0; i < functions.length; i++) {
            const f = functions[i];
            const x = f.ax * Math.sin(f.bx * z) + f.ax2 * Math.sin(f.bx2 * z);
            const y = f.ay * Math.sin(f.by * z) + f.ay2 * Math.sin(f.by2 * z);
            embed(x, y, z, out);
            slicePos[i * 3]     = out[0];
            slicePos[i * 3 + 1] = out[1];
            slicePos[i * 3 + 2] = out[2];
            let sp = 0;
            if (colorMode === 'speed') {
                const p = localXY(f, z), q = localXY(f, zN);
                sp = Math.hypot(q[0]-p[0], q[1]-p[1]) / dz;
            }
            const c = vColor(f, z, sp);
            sliceCol[i * 3]     = c[0];
            sliceCol[i * 3 + 1] = c[1];
            sliceCol[i * 3 + 2] = c[2];
        }
        slice.geometry.attributes.position.needsUpdate = true;
        slice.geometry.attributes.color.needsUpdate = true;
    }

    // --- Faint guide ring at radius R (the time axis / loop centerline) ---
    let ring = null;
    function rebuildRing() {
        disposeObj(ring); ring = null;
        const pts = [];
        for (let i = 0; i <= 128; i++) {
            const t = (i / 128) * Math.PI * 2;
            pts.push(new THREE.Vector3(R * Math.cos(t), R * Math.sin(t), 0));
        }
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        ring = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x39507a, transparent: true, opacity: 0.5 }));
        ring.visible = showRing;
        scene.add(ring);
    }
    rebuildRing();

    /* ================================================================
       PART 3 — UI WIRING + RENDER LOOP
    ================================================================ */
    document.getElementById('generateBtn').addEventListener('click', () => {
        abort_gen = false; groupIDcount = 0; currentFrame = 0;
        time_steps = parseInt(timeInput.value);
        modulation_Max = time_steps / 2;
        numGroups = parseInt(groupInput.value);
        targetGroups = numGroups;
        functions = [];
        bakeZValues(); bakeZThresholdValues();
        make_groups();
    });
    document.getElementById('abortBtn').addEventListener('click', () => { abort_gen = true; });

    function toggleBtn(id, get, set) {
        const el = document.getElementById(id);
        el.addEventListener('click', () => { set(!get()); el.classList.toggle('on', get()); });
    }
    toggleBtn('worldlinesBtn', () => showWorldlines, v => { showWorldlines = v; if (worldlines) worldlines.visible = v; });
    toggleBtn('sweepBtn',      () => showSweep,      v => { showSweep = v; if (slice) slice.visible = v; });
    toggleBtn('ringBtn',       () => showRing,       v => { showRing = v; if (ring) ring.visible = v; });

    document.getElementById('comovingBtn').addEventListener('click', e => {
        comoving = !comoving;
        e.currentTarget.classList.toggle('on', comoving);
        rebuildTorus(); rebuildSlice();   // positions change → rebuild both layers
    });

    document.getElementById('colorBtn').addEventListener('click', e => {
        colorMode = COLOR_MODES[(COLOR_MODES.indexOf(colorMode) + 1) % COLOR_MODES.length];
        e.currentTarget.textContent = 'Color: ' + COLOR_LABELS[colorMode];
        e.currentTarget.classList.toggle('on', colorMode !== 'group');
        rebuildTorus(); rebuildSlice();   // recolor worldlines + slice
    });

    document.getElementById('rRange').addEventListener('input', e => {
        R = parseFloat(e.target.value); rebuildRing(); rebuildTorus(); rebuildSlice();
    });
    document.getElementById('sRange').addEventListener('input', e => {
        S = parseFloat(e.target.value); rebuildTorus(); rebuildSlice();
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function tick() {
        requestAnimationFrame(tick);
        controls.update();
        if (playing && showSweep && functions.length) {
            currentFrame = (currentFrame + 1) % Z_cache.length;
            updateSlice();
        }
        renderer.render(scene, camera);
    }
    tick();
    </script>
</body>
</html>
