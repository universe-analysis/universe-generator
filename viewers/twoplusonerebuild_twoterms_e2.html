<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2+1 Universe generator</title>
    <style>
        body { font-family: sans-serif; }
        canvas { border: 1px solid #ccc; margin-top: 20px; }
        #functionList { margin-top: 20px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .equation { margin: 5px 0; padding: 4px; background: #f0f8ff; border-radius: 4px; }
    </style>
</head>
<body>
    <label for="groupInput">Number of Unique Groups:</label>
    <input type="number" id="groupInput" value="1200" min="1">
	<label for="subInput">Number of SubGroups:</label>
    <input type="number" id="subInput" value="0" min="1" disabled>
	<label for="timeInput">Time-step:</label>
    <input type="number" id="timeInput" value="400" min="1">
    <button id="generateBtn">Generate Paths</button>
	<button id="abortBtn" onclick='abortgenf()'>Abort path generation</button>
	<button id="viewtoggleBtn" onclick='toggleview()'>Switch Global/local viewport scale</button>
	<button id="morphtoggleBtn" onclick='togglemorph()'>Switch Circle/Square morphology</button>
	<button id="erasetoggleBtn" onclick='toggleerase()'>Toggle Frame Erase</button>
	<button id="playBtn">Play</button>
	<button id="pauseBtn" onclick='pauseanimation()'>Pause</button>
    <div id="status"></div>
	<div id="zcounter">Time (z-index):</div>
    <canvas id="canvas" width="600" height="600"></canvas>
	<div id="functioncounter">Functions generated:</div>
    <div id="functionList"></div>
    <script>
	/*
		NOTICE: Subpaths currerently unoperational, unique groups only
		the original prototype subpath code was biased currently rewriting to be better in global probability scope
	    the concept has already been proven to work just need to make it good
	*/
	
		/**
			Abstract:
			
			Upon the set of continious closed paths upon the period 0,pi, bounded by slope +/-1, represented by fourier series terms; consider slope to be represented by the sum of the absolute value of the multiple of the inner and outer modulation coeffecients in each fourier term (this enforces their slope constraint.) Consider a unique group to be a group of paths which intersect each other but never intersect a path in another unqiue group. Picking a number of unique groups, we subdivide the set into groups of unique subpaths. This uses two dimenions of space plus one dimension of time, representing parametric sin waves of the following form (asinbz+...,asinbz+...,z). Modulation of the x and y axis sine form following the above constraints are the building blocks of this model. This generalizes to 3+1 however requires more computation power, therefore this serves as an accessible proof of concept since it can easily be viewed in a browser.
		
		
			Architecture:
			
			The definition of 'intersect' requires an absolute intersection at distance of zero in the abstract form, however when simulating this in discrete form we must use intersection bounds for particles. Luckily there is an easy way to do this, by choosing our intersection square-distance(see below) to be equal to double the value of sin(z)/timestep. While this may allow particles to slightly overlap between discrete timesteps, it prevents paths from fully moving through each other even at the fastest opposing slopes.


			* NOTE ON SQUARES VS CIRCLES
			It is worth noting, this simulation is calculated in SQUARE dimensions, the slope is dimension independent, so if the maximum slope is 1, a particle can move 1 in both x and y at same time. This makes calculations a lot easier considering we can use two single dimension distance calculations instead of squaring and square rooting! This is actually the exact same as using constrained slope across dimension, it just produces different shapes which are morphologically identical. Therefore, we can simply generate this in SQUARE dimensions and then morph it to a circle when rendering to please the corner-haters. 
			* END NOTE
		
			Then, using a unique group count provided or calculated using a automatic time-step-density scale, we randomly modulate acceptable sine waves according to the above description. This becomes slightly technical when we consider that each wave requires every dimensional component of its wave to share at least one frequency coeffecient. If values are independently modulated, the system has no coherence and collapses into a central region. To establish the interdimensional resonance of the universe we must generate our waves ensuring they are at least slightly coherent across dimensions by establising the above coeffecient correlation between dimensions. We do this by establishing a shared asin(1z) fourier term in each dimension where a is uncorrelated between dimension. We then check in each discrete time step for intersections with other functions. If none are found, we have found a new unique path. We find all of the unique paths we want first, and then generate subpaths to 'fill in' the rest of the space. These subpaths add up to form probability regions, however if number of subgroups is zero then only one path will be allowed per unique group. This is fine for large scale visualization, but proper subpaths must be used if one wants to zoom in and render a region in finer precision or observe 'quantum' effects (a particle with more than 1 path representing it exists in multiple positions/velocities at once.)

			
			
			
			Musings: [all of these could be totally wrong just thoughts]
			
			When considering the highest density that unique paths can fit in a single region, the paths must have extremely low relative vibration. 
			
			The boundary between unique groups has fractal properties.
			
			In abstract form a highest density region still has nonzero distance between its paths.
			In analytical form, this raises questions.
			
			Coherence stabilizes the structure against collapse on large scales but collapse effects (gravity) becomes dominant at higher frequencies as the waves becomes less coherent relative to each other by the addition of higher frequency terms.
			
		*/
	
	    const groupInput = document.getElementById('groupInput');
		const subInput = document.getElementById('subInput');
		const timeInput = document.getElementById('timeInput');
        const generateBtn = document.getElementById('generateBtn');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
		const zcounter = document.getElementById('zcounter');
		const functioncounter = document.getElementById('functioncounter');
	
		// Reference direction bounds to show as red circles
		//	Square Bounds
		const referenceFunctions_square = [
            { ax: 1/1, ay: 0, bx: 1, by: 1 },      // Right (x=sinz)
            { ax: -1/1, ay: 0, bx: 1, by: 1 },     // Left (x=-sinz)
            { ax: 0, ay: 1/1, bx: 1, by: 1 },      // Up (y=sinz)
            { ax: 0, ay: -1/1, bx: 1, by: 1 },     // Down (y=-sinz)
            { ax: 1, ay: 1, bx: 1, by: 1 },   // NE diagonal
            { ax: 1, ay: -1, bx: 1, by: 1 },  // SE diagonal
            { ax: -1, ay: 1, bx: 1, by: 1 },  // NW diagonal
            { ax: -1, ay: -1, bx: 1, by: 1 }, // SW diagonal
        ];
		
		//	Circular Bounds
        const referenceFunctions_circle = [
            { ax: 1/1, ay: 0, bx: 1, by: 1 },      // Right (x=sinz)
            { ax: -1/1, ay: 0, bx: 1, by: 1 },     // Left (x=-sinz)
            { ax: 0, ay: 1/1, bx: 1, by: 1 },      // Up (y=sinz)
            { ax: 0, ay: -1/1, bx: 1, by: 1 },     // Down (y=-sinz)
            { ax: 1/2**0.5, ay: 1/2**0.5, bx: 1, by: 1 },   // NE diagonal
            { ax: 1/2**0.5, ay: -1/2**0.5, bx: 1, by: 1 },  // SE diagonal
            { ax: -1/2**0.5, ay: 1/2**0.5, bx: 1, by: 1 },  // NW diagonal
            { ax: -1/2**0.5, ay: -1/2**0.5, bx: 1, by: 1 }, // SW diagonal
        ];
	
		//	Allow toggle between local and global views
		var viewtype=1;
		function toggleview(){
			viewtype*=-1;
		}
		
		var frame_erase=-1;
		function toggleerase(){
			frame_erase*=-1;
		}
		
		var view_bounds=false;
		
		//	Toggle between square and circle based morphology. 1 is circle and -1 is square.
		var morphic_mode=1;
		function togglemorph(){
			morphic_mode*=-1;
		}
		
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
		
		//	Array of paths that each define their own unique group
        let functions = [];
		
		//	Array of subpaths belonging to any group
		let functions_sub2 = [];
		
		//	Run-time variables
		var modulation_Max=0;
		var groupIDcount=0;
		let groupcount={};
		
	
        // Configuration
        var numGroups = parseInt(groupInput.value) || 50;
		var subpath_count=parseInt(subInput.value) || 1;
		var time_steps=parseInt(timeInput.value) || 200;
        var maxAttemptsPerFunction = 50; // can probably remove this
	
		
		var abort_gen=false;
		
		function abortgenf(){
			abort_gen=true;
		}
		
		function cloneJSON(obj){
			return JSON.parse(JSON.stringify(obj));
		}
		
		var Z_cache=[];
		var Z_reverseCache={};
		var Z_threshold_cache=[];
		
		
		function bakeZValues(){
			const numSteps = time_steps;
            const zStart = 0.01;
            const zEnd = Math.PI - 0.01;
            const step = (zEnd - zStart) / (numSteps - 1);
		   Z_cache=Array.from({length: numSteps}, (_, i) => zStart + i * step);
			for (var i=0;i<Z_cache.length;i++){
				Z_reverseCache[Z_cache[i]]=i;
			}
		}

        function calculateDynamicThreshold(z, weightExponent = 2) {
			return Z_threshold_cache[Z_reverseCache[z]];
        }
		
		function bakeZThresholdValues(){
			for (var i=0;i<Z_cache.length;i++){
				Z_threshold_cache.push((Math.sin(Z_cache[i])*(2/time_steps)));
			}
		}
		
        function generateFunction(existingFunctions) {
            for (let attempt = 0; attempt < maxAttemptsPerFunction; attempt++) {
                 var axInitialA = 1;
                var ayInitialA = 1;
		
				var x_splitratio=Math.random();
				var y_splitratio=Math.random();
				
				var axInitial2=x_splitratio*axInitialA;
				var axInitial=(1-x_splitratio)*axInitialA;
				
				var ayInitial2=y_splitratio*ayInitialA;
				var ayInitial=(1-y_splitratio)*ayInitialA;
				
				var bx = Math.floor(Math.random() * (modulation_Max)) + 2;
				var by = Math.floor(Math.random() * (modulation_Max)) + 2;
			   
				if (bx<1){
				bx=1;
				}
				if (by<1){
				by=1;
				}
				
				var bx2 =1;
				var by2=bx2;
				
				if (bx==bx2){
					return null;
				}
				
				if (by==by2){
					return null;
				}
				
				if (bx2<1){
				bx2=1;
				}
				if (by2<1){
				by2=1;
				}
				
				var ax2=axInitial2 / bx2;
				var ay2 = ayInitial2 / by2;
				
                // Calculate final amplitudes ensuring a*b = original component
                var ax = axInitial / bx;
                var ay = ayInitial / by;
				
				var temprX=Math.random();
                var temprY=Math.random();
				if (temprX>.5){
					ax*=-1;
			   }
				if (temprY>.5){
					ay*=-1;
			   }
			   
			   var temprX2=Math.random();
                var temprY2=Math.random();
				if (temprX2>.5){
					ax2*=-1;
			   }
				if (temprY2>.5){
					ay2*=-1;
			   }
			   
                let isUnique = true;
				
				var local_xy_cache={};
				for (const z of Z_cache) {
					var new_xy_obj={};
					new_xy_obj.x= ax * Math.sin(bx * z)+ax2 * Math.sin(bx2 * z);
					new_xy_obj.y= ay * Math.sin(by * z)+ay2 * Math.sin(by2 * z);
					local_xy_cache[z]=new_xy_obj;
				}
				
                for (const existing of existingFunctions) {
                    let tooClose = false;
					for (const z of Z_cache) {
                        // Dynamic threshold calculation
                        const threshold = calculateDynamicThreshold(z);
					    const x1 =local_xy_cache[z].x;
					    const y1 =local_xy_cache[z].y;
                        const x2 = existing.ax * Math.sin(existing.bx * z)+existing.ax2 * Math.sin(existing.bx2 * z);
                        const y2 = existing.ay * Math.sin(existing.by * z)+existing.ay2 * Math.sin(existing.by2 * z);
						
						if (Math.abs(x1 - x2)<=threshold&&Math.abs(y1 - y2)<=threshold){
                            tooClose = true;
                            break;
                        }
                    }
                    if (tooClose) {
                        isUnique = false;
                        break;
                    }
                }
                
                if (isUnique) {
					var new_RGB={};
					var groupID=0+groupIDcount;
					groupcount[groupID]=0;
					new_RGB.r=Math.floor(Math.random() * 255);
					new_RGB.g=Math.floor(Math.random() * 255);
					new_RGB.b=Math.floor(Math.random() * 255);
				  return { ax, ay, bx, by, ax2, ay2, bx2, by2, new_RGB ,groupID};
                }
            }
            return null; 
        }
		
		
	generateBtn.addEventListener('click', () => {
		groupIDcount=0;
		time_steps=parseInt(timeInput.value);
		modulation_Max=time_steps/2;
		numGroups = parseInt(groupInput.value);
		subpath_count=parseInt(subInput.value);
		time_steps=parseInt(timeInput.value);
		bakeZValues();
		bakeZThresholdValues();
		status.textContent = 'Generating...';
		functions = [];
		targetGroups = parseInt(groupInput.value) || numGroups;
		make_groups();
	});
		
		
		
	function make_groups(){
		const newFunction = generateFunction(functions);
		if (newFunction) {
			functions.push(newFunction);
			functioncounter.textContent = 'Functions generated:'+functions.length;
			groupIDcount++;
			
		} 

		if ((functions.length < targetGroups)&&(!abort_gen)){
			setTimeout(make_groups,10);
		}else{
			status.textContent = `Generated ${functions.length+functions_sub2.length} unique paths`;
		
			// Display generated functions in equation format
			const listContainer = document.getElementById('functionList');
			listContainer.innerHTML = '';
			functions.forEach((f, index) => {
				const para = document.createElement('div');
				para.className = 'equation';
				const axSign = f.ax >= 0 ? '' : '-';
				const aySign = f.ay >= 0 ? '' : '-';
				const ax2Sign = f.ax2 >= 0 ? '' : '-';
				const ay2Sign = f.ay2 >= 0 ? '' : '-';
				// Format equations with proper signs and spacing
				const equation = `Function ${index + 1}: 
			(x = ${axSign} (${Math.abs(f.ax).toFixed(6)} sin(${f.bx}z)) + ${ax2Sign} (${Math.abs(f.ax2).toFixed(6)} sin(${f.bx2}z)), 
			y = ${aySign} (${Math.abs(f.ay).toFixed(6)} sin(${f.by}z)) + ${ay2Sign} (${Math.abs(f.ay2).toFixed(6)} sin(${f.by2}z)))`;
				para.textContent = equation;
				listContainer.appendChild(para);
			});
		}
	}

	var targetGroups = parseInt(groupInput.value) || numGroups;

	let currentFrame = 0;
	
	var ispaused=false;
	function pauseanimation(){
		ispaused=true;
	}

	playBtn.addEventListener('click', () => {
		if (functions.length === 0) return;
		ispaused=false;
		//currentFrame = 0;
		animate();
	});
	
	
	function squareToCircle(x, y) {
    // Handle the origin case to avoid division by zero
    if (x === 0 && y === 0) {
        return { x: 0, y: 0 };
    }

    // Calculate max magnitude and radial distance
    const m = Math.max(Math.abs(x), Math.abs(y));
    const r = Math.sqrt(x * x + y * y);

    // Scale factor to fit into unit circle
    const scale = m / r;

    // Return transformed coordinates
    return {
        x: x * scale,
        y: y * scale
    };
}

	function animate() {
		if (frame_erase==1){
			ctx.clearRect(0, 0, canvas.width, canvas.height);
		}
		const z = Z_cache[currentFrame];
		const scale = Math.sin(z);
		const centerX = canvas.width / 2;
		const centerY = canvas.height / 2;
		var scaleMultiplier=1;
		if (viewtype==-1){
			scaleMultiplier = Math.min(centerX / scale, centerY / scale);
		}else{
			scaleMultiplier =300;
		}
		
		for (const f of functions) {
		    var x = f.ax * Math.sin(f.bx * z)+f.ax2 * Math.sin(f.bx2 * z);
			var y = f.ay * Math.sin(f.by * z)+f.ay2 * Math.sin(f.by2 * z);
			if (morphic_mode==1){
				var new_coords=squareToCircle(x,y);
				x=new_coords.x;
				y=new_coords.y;
			}
		
			const scaleMultiplierX = centerX * (x/scale);
			const scaleMultiplierY = centerY * (y/scale);
			
			var px,py=1;
			if (viewtype==-1){
				py = centerY + scaleMultiplierY;
				px = centerX + scaleMultiplierX;
			}else{
				px = centerX + (x*300);
				py = centerY + (y*300);
			}
			
			if (morphic_mode==-1){
				ctx.fillStyle = `rgba(${f.new_RGB.r}, ${f.new_RGB.g}, ${f.new_RGB.b}, .8)`;
				ctx.fillRect(px-2, py-2,4,4);
			}else{
				ctx.beginPath();
				ctx.arc(px, py, 2, 0, Math.PI * 2); 
				ctx.fillStyle = `rgba(${f.new_RGB.r}, ${f.new_RGB.g}, ${f.new_RGB.b}, .8)`;
				ctx.fill();
			}
		}
		
		for (const f of functions_sub2) {
			const x = f.ax * Math.sin(f.bx * z)+f.ax2 * Math.sin(f.bx2 * z);
			const y = f.ay * Math.sin(f.by * z)+f.ay2 * Math.sin(f.by2 * z);
			
			const scaleMultiplierX = centerX * (x/scale);
			const scaleMultiplierY = centerY * (y/scale);
			
			var px,py=1;
			if (viewtype==-1){
				py = centerY + scaleMultiplierY;
				px = centerX + scaleMultiplierX;
			}else{
				px = centerX + (x*300);
				py = centerY + (y*300);
			}
			
			ctx.fillStyle = `rgba(${f.new_RGB.r}, ${f.new_RGB.g}, ${f.new_RGB.b}, .6)`;
		    ctx.fillRect(px-2, py-2,4,4);
		}

		if (view_bounds){
			// Draw reference directions in red
			ctx.strokeStyle = 'red';
			ctx.lineWidth = 2;
			
			if (morphic_mode==-1){
				for (const ref of referenceFunctions_square) {
					const x = ref.ax * Math.sin(ref.bx * z);
					const y = ref.ay * Math.sin(ref.by * z);
					
					// Map to pixel coordinates
					const px = centerX + x * scaleMultiplier;
					const py = centerY + y * scaleMultiplier;
					
					// Draw a small line segment at the point's position
					ctx.beginPath();
					ctx.arc(px, py, 10, 0, Math.PI * 2);
					ctx.stroke();
				}
			}else{
				for (const ref of referenceFunctions_circle) {
					const x = ref.ax * Math.sin(ref.bx * z);
					const y = ref.ay * Math.sin(ref.by * z);
					
					// Map to pixel coordinates
					const px = centerX + x * scaleMultiplier;
					const py = centerY + y * scaleMultiplier;
					
					// Draw a small line segment at the point's position
					ctx.beginPath();
					ctx.arc(px, py, 10, 0, Math.PI * 2);
					ctx.stroke();
				}
			}
		}
		zcounter.textContent = 'Time (z-index):'+currentFrame;
		currentFrame++;
		if (!ispaused){
			//if (currentFrame < zValues.length) {
			if (currentFrame < Z_cache.length) {
				setTimeout(animate,25);
			} else {
				currentFrame = 0; // Reset for looping
				if (frame_erase==-1){
					ctx.clearRect(0, 0, canvas.width, canvas.height);
				}
				setTimeout(animate,25);
			}
		}
	}
    </script>
</body>
</html>
